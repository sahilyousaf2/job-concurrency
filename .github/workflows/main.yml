name: Job Concurrency

on:
  push:
    branches: [ main ]

jobs:
  job-concurrency:
    runs-on: ubuntu-latest

    concurrency: 
      group: Deploy
      cancel-in-progress: true

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Next JS
        run: npm run build

      - name: Deploy Our App
        run: echo "Deployed Your App Successfully...!"
